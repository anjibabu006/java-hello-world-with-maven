name: Maven Hello World CI/CD

# Define triggers for code changes
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

# Grant permissions to allow pushing images to GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Converts the repository name to lowercase to prevent Docker naming errors
  IMAGE_NAME: ${{ github.repository }}
  
jobs:
  # CONTINUOUS INTEGRATION (CI)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Automatically caches .m2 dependencies to save time

      - name: Compile and Run Tests
        run: mvn clean test

      - name: Package Application
        run: mvn package -DskipTests # Packages code into a target/ target JAR

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-world-jar
          path: target/*.jar
      # --- NEW DOCKER STEPS START HERE ---
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract Docker metadata (Tags & Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ std_out.meta.outputs.tags || steps.meta.outputs.tags }}
          labels: ${{ std_out.meta.outputs.labels || steps.meta.outputs.labels }}

 
